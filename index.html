<!DOCTYPE html>
<html lang="en-us">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
        <title>Rooftop Run</title>
        <style>
            html, body {
                width: 100%;
                height: 100%;
                padding: 0px;
                margin: 0px;
                background-color: #242424;
            }
            .fullscreen-canvas {
                background: #242424;
                width: 100%;
                height: 100%;
                position: absolute;
                top: 0px;
                left: 0px;
            }
            #loading-text {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                color: white;
                font-family: sans-serif;
                font-size: 20px;
                pointer-events: none;
                z-index: 10;
            }
        </style>
    </head>
    <body>
        <div id="loading-text">Loading Game Engine...</div>
        <canvas id="canvas" class="fullscreen-canvas"></canvas>

        <script>
            if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
                let meta = document.createElement('meta')
                meta.name = 'viewport'
                meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes'
                document.getElementsByTagName('head')[0].appendChild(meta)
            }

            let canvas = document.getElementById('canvas')
            window.unityInstance = null

            function onUnityLoadingProgressChanged(progress) {
                let loadingEl = document.getElementById('loading-text');
                if (loadingEl) {
                    let percent = Math.round(progress * 100);
                    loadingEl.textContent = "Loading: " + percent + "%";
                    if (progress === 1) {
                        loadingEl.style.display = "none";
                    }
                }
            }
            
            window.addEventListener('pointerdown', () => {
                window.focus()
                canvas.focus()
            })
            
            // Re-structured deep mock setup mimicking a complete native Playgama API integration environment
            window.bridge = {
                engine: 'unity',
                platform: { id: 'mock', language: 'en', payload: '', tld: 'com', isAudioEnabled: true },
                storage: { 
                    defaultType: 'local', 
                    isSupported: () => true, 
                    isAvailable: () => true,
                    get: function(keys, callback) {
                        let keyList = typeof keys === 'string' ? keys.split(',') : keys;
                        let results = {};
                        keyList.forEach(k => {
                            results[k] = localStorage.getItem("rooftop_run_" + k.trim()) || "";
                        });
                        if (typeof callback === 'function') callback(null, results);
                    },
                    set: function(key, value, callback) {
                        localStorage.setItem("rooftop_run_" + key, value);
                        if (typeof callback === 'function') callback(null);
                    }
                },
                advertisement: { isBannerSupported: false, isInterstitialSupported: false, isRewardedSupported: false }
            };

            // Force immediate game load completely bypassing external ad infrastructure
            let unityLoader = document.createElement('script')
            unityLoader.src = 'Build/Rooftop Run Web 1.0.2.loader.js'
            unityLoader.onload = () => {
                createUnityInstance(
                    canvas,
                    {
                        dataUrl: 'Build/Rooftop Run Web 1.0.2.data',
                        frameworkUrl: 'Build/Rooftop Run Web 1.0.2.framework.js',
                        codeUrl: 'Build/Rooftop Run Web 1.0.2.wasm',
                        streamingAssetsUrl: 'StreamingAssets',
                        companyName: 'MadHook',
                        productName: 'Rooftop Run',
                        productVersion: '3.4.21',
                    },
                    onUnityLoadingProgressChanged)
                    .then((unityInstance) => {
                        window.unityInstance = unityInstance
                        canvas.focus()
                    })
                    .catch((error) => {
                        console.error(error)
                    })
            }
            document.body.appendChild(unityLoader);

            // ==========================================
            // PLAYGAMA AD-BRIDGE EMULATION INTERFACE 
            // ==========================================

            // Resilient global communication layer that directly queries the engine instances
            window.sendMessageToUnity = function(methodName, value) {
                if (!window.unityInstance) return;
                
                // Fallback targets + explicit Playgama core hooks
                let targets = ['PlaygamaBridge', 'Bridge', 'AdBridge', 'Main', 'GameManager'];
                
                // We add native Playgama direct string callback mapping methods to force the engine to accept the save data format
                let methods = [methodName];
                if (methodName === 'OnGetStorageDataSuccess') {
                    methods.push('OnStorageGetSuccess', 'OnGetStorageSuccess', 'OnGetDataSuccess');
                }
                if (methodName === 'OnSetStorageDataSuccess') {
                    methods.push('OnStorageSetSuccess', 'OnSetStorageSuccess', 'OnSetDataSuccess');
                }

                targets.forEach(obj => {
                    methods.forEach(m => {
                        try {
                            window.unityInstance.SendMessage(obj, m, value);
                        } catch(e) {}
                    });
                });
            };

            window.sendMessageToPlatform = function(message, payload) { return true; };
            window.setMinimumDelayBetweenInterstitial = function(seconds) { return true; };

            window.getPlatformId = () => 'mock';
            window.getPlatformLanguage = () => 'en';
            window.getPlatformPayload = () => '';
            window.getPlatformTld = () => 'com';
            window.getIsPlatformAudioEnabled = () => 'true';
            window.getStorageDefaultType = () => 'local';
            window.getIsStorageSupported = () => 'true';
            window.getIsStorageAvailable = () => 'true';
            window.getInterstitialState = () => '';
            window.getIsBannerSupported = () => 'false';
            window.getIsInterstitialSupported = () => 'false';
            window.getIsRewardedSupported = () => 'false';
            
            window.checkAdBlock = () => {
                window.sendMessageToUnity('OnCheckAdBlockCompleted', 'false');
            };

            // Enhanced data parsing structure matching Playgama data arrays
            window.getStorageData = function(keysString) {
                console.log("Mock Load Data Triggered for raw keys:", keysString);
                let keys = keysString.split('{bridge_keys_separator}');
                let results = [];

                keys.forEach(key => {
                    let cleanedKey = key.trim();
                    let savedValue = localStorage.getItem("rooftop_run_" + cleanedKey) || "";
                    results.push(`${cleanedKey}{bridge_data_separator}${savedValue}`);
                });

                let compiledPayload = results.join('{bridge_array_separator}');
                console.log("Sending loaded payload to Unity:", compiledPayload);
                
                window.sendMessageToUnity('OnGetStorageDataSuccess', compiledPayload);
                
                // CRITICAL: We broadcast an additional JSON format callback directly to Playgama targets 
                // because some engine compiles expect a clean stringified object representation instead of separator codes.
                try {
                    let jsonObj = {};
                    keys.forEach(key => {
                        let cleanedKey = key.trim();
                        jsonObj[cleanedKey] = localStorage.getItem("rooftop_run_" + cleanedKey) || "";
                    });
                    window.sendMessageToUnity('OnStorageGetSuccess', JSON.stringify(jsonObj));
                } catch(e) {}
            };

            window.setStorageData = function(key, value) {
                console.log("Mock Save Data Triggered:", key, value);
                localStorage.setItem("rooftop_run_" + key, value);
                window.sendMessageToUnity('OnSetStorageDataSuccess', key);
            };
        </script>
    </body>
</html>

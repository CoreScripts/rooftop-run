<!DOCTYPE html>
<html lang="en-us">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
        <title>Rooftop Run</title>
        <style>
            html, body {
                width: 100%;
                height: 100%;
                padding: 0px;
                margin: 0px;
                background-color: #242424;
            }
            .fullscreen-canvas {
                background: #242424;
                width: 100%;
                height: 100%;
                position: absolute;
                top: 0px;
                left: 0px;
            }
            /* Clean loading indicator */
            #loading-text {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                color: white;
                font-family: sans-serif;
                font-size: 20px;
                pointer-events: none;
                z-index: 10;
            }
        </style>
    </head>
    <body>
        <div id="loading-text">Loading Game Engine...</div>
        <canvas id="canvas" class="fullscreen-canvas"></canvas>

        <script>
            // Mobile viewport scaling logic
            if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
                let meta = document.createElement('meta')
                meta.name = 'viewport'
                meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes'
                document.getElementsByTagName('head')[0].appendChild(meta)
            }

            let canvas = document.getElementById('canvas')
            window.unityInstance = null

            // Bypassed bridge progress tracker
            function onUnityLoadingProgressChanged(progress) {
                let loadingEl = document.getElementById('loading-text');
                if (loadingEl) {
                    let percent = Math.round(progress * 100);
                    loadingEl.textContent = "Loading: " + percent + "%";
                    if (progress === 1) {
                        loadingEl.style.display = "none";
                    }
                }
            }
            
            window.addEventListener('pointerdown', () => {
                window.focus()
                canvas.focus()
            })
            
            // Dummy bridge object to prevent Unity console errors if internal scripts check for it
            window.bridge = {
                engine: 'unity',
                platform: { id: 'mock', language: 'en', payload: '', tld: 'com', isAudioEnabled: true },
                storage: { defaultType: 'local', isSupported: () => true, isAvailable: () => true },
                advertisement: { isBannerSupported: false, isInterstitialSupported: false, isRewardedSupported: false }
            };

            // Force immediate game load completely bypassing external ad infrastructure
            let unityLoader = document.createElement('script')
            unityLoader.src = 'Build/Rooftop Run Web 1.0.2.loader.js'
            unityLoader.onload = () => {
                createUnityInstance(
                    canvas,
                    {
                        dataUrl: 'Build/Rooftop Run Web 1.0.2.data',
                        frameworkUrl: 'Build/Rooftop Run Web 1.0.2.framework.js',
                        codeUrl: 'Build/Rooftop Run Web 1.0.2.wasm',
                        streamingAssetsUrl: 'StreamingAssets',
                        companyName: 'MadHook',
                        productName: 'Rooftop Run',
                        productVersion: '3.4.21',
                    },
                    onUnityLoadingProgressChanged)
                    .then((unityInstance) => {
                        window.unityInstance = unityInstance
                        canvas.focus()
                    })
                    .catch((error) => {
                        console.error(error)
                    })
            }
            document.body.appendChild(unityLoader);

            // Mocking empty bridge functions to prevent internal web assembly game-hook breaks
            window.getPlatformId = () => 'mock';
            window.getPlatformLanguage = () => 'en';
            window.getPlatformPayload = () => '';
            window.getPlatformTld = () => 'com';
            window.getIsPlatformAudioEnabled = () => 'true';
            window.getStorageDefaultType = () => 'local';
            window.getIsStorageSupported = () => 'true';
            window.getIsStorageAvailable = () => 'true';
            window.getInterstitialState = () => '';
            window.getIsBannerSupported = () => 'false';
            window.getIsInterstitialSupported = () => 'false';
            window.getIsRewardedSupported = () => 'false';
            window.checkAdBlock = () => sendMessageToUnity('OnCheckAdBlockCompleted', 'false');
            window.getStorageData = (key) => sendMessageToUnity('OnGetStorageDataSuccess', `${key}{bridge_data_separator}`);
            window.setStorageData = (key) => sendMessageToUnity('OnSetStorageDataSuccess', key);
        </script>
    </body>
</html>
